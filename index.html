
<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>DEVIL App Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #111;
      color: #fff;
      -ms-content-zooming: none;
      touch-action: manipulation;
      overscroll-behavior: none;
      min-height: 100vh;
    }

    html, body {
      touch-action: manipulation;
      height: 100%;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* Auth Pages */
    .auth-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-container {
      background: rgba(30, 30, 30, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(79, 70, 229, 0.3);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #4f46e5, #c026d3);
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .auth-header p {
      color: #aaa;
      font-size: 0.9rem;
    }

    .auth-form .form-group {
      margin-bottom: 20px;
    }

    .auth-form label {
      display: block;
      margin-bottom: 8px;
      color: #ddd;
      font-size: 0.9rem;
    }

    .auth-form input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .auth-form input:focus {
      border-color: #4f46e5;
    }

    .auth-form input::placeholder {
      color: #666;
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #4f46e5, #c026d3);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.3s;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
    }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      color: #aaa;
    }

    .auth-switch a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .auth-message {
      text-align: center;
      margin-top: 15px;
      font-size: 0.9rem;
      min-height: 20px;
    }

    .auth-message.error {
      color: #dc2626;
    }

    .auth-message.success {
      color: #10b981;
    }

    /* Header Styles */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: #1f1f1f;
      position: sticky;
      top: 0;
      z-index: 100;
      display: none;
    }

    .store-title {
      font-size: 1.8rem;
      background: linear-gradient(80deg, #4f46e5, #c026d3);
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    .icons {
      display: flex;
      gap: 1rem;
      position: relative;
    }

    .icon {
      cursor: pointer;
      font-size: 1.5rem;
      position: relative;
    }

    #notif-dot {
      display: none;
      position: absolute;
      top: 0;
      right: 0;
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
    }

    .dropdown-menu {
      display: none;
      flex-direction: column;
      background: #222;
      position: absolute;
      top: 60px;
      right: 1rem;
      padding: 0.5rem;
      border-radius: 8px;
      z-index: 100;
    }

    .dropdown-menu a, .dropdown-menu .menu-item {
      color: #ccc;
      text-decoration: none;
      margin-bottom: 0.5rem;
      cursor: pointer;
      padding: 5px 10px;
    }

    .dropdown-menu .menu-item:hover {
      background: #333;
      border-radius: 5px;
    }

    .balance-btn {
      cursor: pointer;
      font-size: 0.9rem;
      background: linear-gradient(90deg, #4f46e5, #c026d3);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      border: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .balance-btn:hover {
      transform: scale(1.05);
    }

    /* Main App Store Page */
    .main-page {
      display: none;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 2rem 1rem;
    }

    .search-bar {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
    }

    .search-bar-inner {
      display: flex;
      background: #333;
      border-radius: 50px;
      padding: 0.2rem;
      width: 100%;
      max-width: 600px;
    }

    #searchInput {
      flex: 1;
      border: none;
      border-radius: 50px 0 0 50px;
      padding: 0.8rem;
      background: transparent;
      color: #fff;
      outline: none;
    }

    #categorySelect {
      border: none;
      background: transparent;
      color: #fff;
      padding: 0 1rem;
      border-radius: 0 50px 50px 0;
      outline: none;
    }

    #app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 12px;
      justify-items: center;
    }

    .app-card {
      background: #1e1e1e;
      padding: 1rem;
      border-radius: 10px;
      text-align: center;
      width: 100%;
      max-width: 120px;
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    .app-card:hover {
      transform: scale(1.03);
    }

    .app-logo {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .app-card h3 {
      font-size: 1rem;
      margin: 0.5rem 0 0.2rem;
    }

    .app-card p {
      font-size: 0.8rem;
      color: #aaa;
      margin: 0;
    }

    .view-btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.4rem 0.9rem;
      font-size: 0.75rem;
      background: linear-gradient(90deg, #3b82f6, #06b6d4);
      color: white;
      text-decoration: none;
      border-radius: 25px;
      cursor: pointer;
    }

    /* Notifications Modal */
    .notifications-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .notifications-content {
      background: #222;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      padding: 20px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .notifications-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .notifications-title {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .notification-item {
      background: #333;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .notification-title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .notification-time {
      font-size: 0.8rem;
      color: #aaa;
    }

    /* Payment Page */
    .payment-page {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      z-index: 1000;
      overflow-y: auto;
    }

    .payment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: #1f1f1f;
    }

    .payment-title {
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #4f46e5, #c026d3);
      -webkit-background-clip: text;
      color: transparent;
    }

    .payment-container {
      max-width: 500px;
      margin: auto;
      padding: 2rem 1rem;
    }

    .payment-card {
      background: #1e1e1e;
      border-radius: 15px;
      padding: 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .qr-container {
      background: white;
      padding: 1rem;
      border-radius: 10px;
      margin: 1.5rem 0;
      display: inline-block;
    }

    .qr-code {
      width: 200px;
      height: 200px;
      background: #f0f0f0;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: #333;
      text-align: center;
    }

    .qr-code img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 5px;
    }

    .payment-instructions {
      background: #333;
      padding: 1rem;
      border-radius: 10px;
      margin: 1rem 0;
      text-align: left;
    }

    .instructions-title {
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: #4f46e5;
    }

    .instructions-list {
      padding-left: 1.2rem;
      margin: 0;
    }

    .instructions-list li {
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .amount-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 1.5rem 0;
    }

    .amount-option {
      background: #333;
      border: 2px solid transparent;
      color: white;
      padding: 1rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .amount-option:hover {
      background: #444;
    }

    .amount-option.selected {
      border-color: #4f46e5;
      background: #2a2a2a;
    }

    .custom-amount {
      width: 100%;
      padding: 1rem;
      border-radius: 10px;
      border: none;
      background: #333;
      color: white;
      margin: 10px 0;
      box-sizing: border-box;
      text-align: center;
      font-size: 1rem;
    }

    .upi-id {
      background: #333;
      padding: 1rem;
      border-radius: 10px;
      margin: 1rem 0;
      font-family: monospace;
      font-size: 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .copy-btn {
      background: #4f46e5;
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #4f46e5, #c026d3);
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
      font-size: 1rem;
    }

    /* UTR Modal */
    .utr-modal {
      display: none;
      position: fixed;
      z-index: 10000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
    }

    .utr-modal-content {
      background: #1e1e1e;
      margin: 20% auto;
      padding: 2rem;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      border: 2px solid #4f46e5;
    }

    .utr-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: #4f46e5;
    }

    .utr-input {
      width: 100%;
      padding: 1rem;
      border-radius: 10px;
      border: none;
      background: #333;
      color: white;
      margin: 1rem 0;
      font-size: 1rem;
    }

    .utr-note {
      font-size: 0.9rem;
      color: #ffaa00;
      margin-bottom: 1.5rem;
    }

    .utr-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .utr-submit {
      background: #10b981;
      color: white;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      flex: 1;
    }

    .utr-cancel {
      background: #dc2626;
      color: white;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      flex: 1;
    }

    /* Admin Panel */
    .admin-panel {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      z-index: 10000;
      overflow-y: auto;
      padding: 2rem 1rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .admin-title {
      font-size: 2rem;
      background: linear-gradient(90deg, #4f46e5, #c026d3);
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    .request-card {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      border-left: 5px solid #f59e0b;
    }

    .request-card.approved {
      border-left-color: #10b981;
      opacity: 0.7;
    }

    .request-amount {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4f46e5;
    }

    .request-detail {
      color: #aaa;
      font-size: 0.9rem;
      margin: 0.3rem 0;
    }

    .approve-btn {
      background: #10b981;
      color: white;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 0.5rem;
    }

    .reject-btn {
      background: #dc2626;
      color: white;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    /* App Details Page */
    .app-details-page {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      z-index: 1000;
      overflow-y: auto;
    }

    .details-container {
      max-width: 800px;
      margin: auto;
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
      margin-top: 2rem;
      margin-bottom: 2rem;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }

    .details-app-logo {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      object-fit: cover;
      background: #333;
    }

    .details-title {
      font-size: 1.8rem;
    }

    .version {
      font-size: 0.9rem;
      color: #bbb;
    }

    #appDescription {
      margin-top: 1.5rem;
      line-height: 1.7;
    }

    .screenshots {
      margin-top: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
    }

    .screenshots img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 15px;
      background: #222;
    }

    .purchase-section {
      margin: 2rem 0;
      text-align: center;
    }

    .purchase-info {
      background: #1e1e1e;
      padding: 1.5rem;
      border-radius: 15px;
      margin-bottom: 1.5rem;
    }

    .price-tag {
      font-size: 2rem;
      font-weight: bold;
      background: linear-gradient(90deg, #4f46e5, #c026d3);
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }

    .balance-check {
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .confirm-purchase-btn {
      background: linear-gradient(90deg, #10b981, #059669);
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 25px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin: 1rem 0;
      transition: all 0.3s;
    }

    .confirm-purchase-btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .confirm-purchase-btn:disabled {
      background: #666;
      cursor: not-allowed;
      transform: none;
    }

    .download-section {
      display: none;
      text-align: center;
      margin: 2rem 0;
    }

    .download-ready {
      background: linear-gradient(90deg, #10b981, #059669);
      color: white;
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-weight: bold;
    }

    .details-download-btn {
      background: linear-gradient(to right, #6d28d9, #d946ef);
      color: white;
      padding: 0.7rem 1.6rem;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      margin: 0 auto;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
      width: 200px;
    }

    .details-download-btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .how-btn {
      background: linear-gradient(to right, #3b82f6, #06b6d4);
      margin-top: 1rem;
    }

    .back-btn {
      background: #333;
      color: white;
      padding: 0.7rem 1.6rem;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      margin-bottom: 2rem;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
    }

    .back-btn:hover {
      background: #444;
    }

    .balance-warning {
      background: #dc2626;
      color: white;
      padding: 1rem;
      border-radius: 10px;
      margin: 1rem 0;
      text-align: center;
      font-weight: bold;
    }

    .balance-success {
      background: #10b981;
      color: white;
      padding: 1rem;
      border-radius: 10px;
      margin: 1rem 0;
      text-align: center;
      font-weight: bold;
    }

    /* Confirm Purchase Modal */
    .confirm-modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
    }

    .confirm-modal-content {
      background: #1e1e1e;
      margin: 15% auto;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      border: 2px solid #4f46e5;
    }

    .confirm-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: #4f46e5;
    }

    .confirm-message {
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .confirm-price {
      font-size: 1.8rem;
      font-weight: bold;
      color: #10b981;
      margin: 1rem 0;
    }

    .confirm-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .confirm-yes {
      background: #10b981;
      color: white;
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      flex: 1;
    }

    .confirm-no {
      background: #dc2626;
      color: white;
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      flex: 1;
    }

    /* Instruction Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
